<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch Trình</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="logo">🌸</span>
      <div>
        <h1 class="title">Lịch Trình</h1>
        <p class="subtitle" id="subtitle">đang tải...</p>
      </div>
    </div>
  </header>

  <div class="filter-tabs">
    <button class="tab active" data-filter="all">Tất cả</button>
    <button class="tab" data-filter="pending">Chờ</button>
    <button class="tab" data-filter="done">Xong</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="add-form" id="add-form">
    <div class="form-header">
      <span id="form-title">Thêm công việc</span>
      <button class="icon-btn" id="btn-cancel-form">✕</button>
    </div>
    <input type="text" class="form-input" id="input-name" placeholder="Tên công việc..." />
    <div class="input-row">
        <input type="date" class="form-input" id="input-date" />
        <input type="time" class="form-input" id="input-time" />
    </div>
    <select class="form-input" id="input-priority">
        <option value="high">🔴 Quan trọng (Cao)</option>
        <option value="medium" selected>🟡 Bình thường (TB)</option>
        <option value="low">🔵 Ít quan trọng (Thấp)</option>
    </select>
    <div class="form-actions">
      <button class="btn-primary" id="btn-save">Lưu</button>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <button class="fab" id="btn-add">+</button>

  <script src="popup.js"></script>
</body>
</html>
