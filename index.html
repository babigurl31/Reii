<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* HỆ THỐNG MÀU SẮC (CÓ THỂ THAY ĐỔI) */
        :root {
            --accent: #ec407a; 
            --bg-main: #fce4ec; 
            --bg-card: #ffffff; 
            --text-main: #000000; 
            --border: #f8bbd0;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Syne', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; transition: 0.3s; }
        
        /* HEADER & TIỆN ÍCH */
        .header { text-align: center; margin-bottom: 20px; position: relative; }
        .header h1 { color: var(--accent); font-size: 28px; }
        
        .clock-box { font-size: 18px; font-weight: bold; margin: 10px 0; color: var(--text-main); }
        
        .goal-container { 
            background: var(--bg-card); 
            padding: 15px; 
            border-radius: var(--radius); 
            display: inline-block; 
            border: 2px solid var(--accent);
            margin-bottom: 20px;
            position: relative;
        }
        .goal-text { font-weight: 800; font-size: 16px; color: var(--accent); }
        .edit-goal-btn { margin-left: 10px; cursor: pointer; font-size: 12px; color: var(--text-muted); text-decoration: underline; }

        /* BỘ CHỈNH MÀU */
        .theme-picker { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        /* TABS */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .tab-btn { background: var(--bg-card); border: 2px solid var(--border); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .tab-content { display: none; background: var(--bg-card); padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BẢNG LỊCH THÁNG */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-header { font-weight: bold; color: var(--accent); padding: 10px 0; text-align: center; border-bottom: 2px solid var(--border); }
        .cal-day { border: 1px solid #f0f0f0; border-radius: 8px; min-height: 90px; padding: 5px; position: relative; }
        .day-num { font-weight: bold; font-size: 12px; }
        .event-tag { font-size: 10px; background: var(--bg-main); color: var(--accent); padding: 2px 4px; border-radius: 4px; margin-top: 2px; cursor: pointer; border-left: 2px solid var(--accent); }

        /* WEEKLY PLANNER */
        .weekly-grid { display: grid; grid-template-columns: 70px repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .wk-header, .wk-time, .wk-cell { background: #fff; padding: 8px; font-size: 12px; }
        .wk-header { text-align: center; font-weight: bold; color: var(--accent); background: var(--bg-main); }
        .wk-cell { min-height: 100px; display: flex; flex-direction: column; gap: 4px; }
        .task-card { background: var(--bg-main); padding: 4px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; justify-content: space-between; }
        
        .add-btn-small { font-size: 10px; color: var(--accent); cursor: pointer; margin-top: auto; text-align: center; border: 1px dashed var(--accent); border-radius: 4px; }

        /* CÁC CHỨC NĂNG PHỤ */
        .widget-area { margin-top: 30px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .widget { background: var(--bg-card); padding: 15px; border-radius: var(--radius); border: 1px solid var(--border); min-width: 200px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Rei 🌸</h1>
        <div class="clock-box" id="vnClock">Đang tải giờ Việt Nam...</div>
        
        <div class="goal-container">
            <span class="goal-text" id="myGoal">Mục tiêu: Kiếm việc! Kiếm 100 triệu đầu tiên!</span>
            <span class="edit-goal-btn" onclick="editGoal()">[Chỉnh sửa]</span>
        </div>

        <div class="theme-picker">
            <div class="color-dot" style="background: #ec407a;" onclick="setTheme('#ec407a', '#fce4ec')"></div>
            <div class="color-dot" style="background: #7e57c2;" onclick="setTheme('#7e57c2', '#f3e5f5')"></div>
            <div class="color-dot" style="background: #26a69a;" onclick="setTheme('#26a69a', '#e0f2f1')"></div>
            <div class="color-dot" style="background: #ffa726;" onclick="setTheme('#ffa726', '#fff3e0')"></div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('monthly')">Lịch Quan Trọng</button>
        <button class="tab-btn" onclick="switchTab('weekly')">Kế Hoạch Tuần</button>
        <button class="tab-btn" onclick="switchTab('daily')">Việc Hôm Nay</button>
    </div>

    <div id="monthly" class="tab-content active">
        <h3 style="text-align:center; color: var(--accent); margin-bottom: 10px;">Lịch Tháng 4 / 2026</h3>
        <div class="calendar-grid" id="calGrid">
            <div class="cal-header">T2</div><div class="cal-header">T3</div><div class="cal-header">T4</div>
            <div class="cal-header">T5</div><div class="cal-header">T6</div><div class="cal-header">T7</div><div class="cal-header">CN</div>
        </div>
    </div>

    <div id="weekly" class="tab-content">
        <div class="weekly-grid" id="weekGrid"></div>
    </div>

    <div id="daily" class="tab-content">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="dailyInput" placeholder="Hôm nay cần làm gì Nghi ơi?" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border);">
            <button onclick="addDaily()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Thêm</button>
        </div>
        <div id="dailyList"></div>
    </div>

    <div class="widget-area">
        <div class="widget">
            <h4 style="color:var(--accent)">Đếm ngược tốt nghiệp 🎓</h4>
            <div id="countdown" style="font-weight:bold; margin-top:10px;">-- ngày nữa</div>
        </div>
        <div class="widget">
            <h4 style="color:var(--accent)">Lo-fi Music 🎧</h4>
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWWQRvui9Df7X?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <script>
        // --- 1. ĐỒNG HỒ VIỆT NAM ---
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Asia/Ho_Chi_Minh', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const vnTime = new Intl.DateTimeFormat('vi-VN', options).format(now);
            const dateOptions = { timeZone: 'Asia/Ho_Chi_Minh', day: '2-digit', month: '2-digit', year: 'numeric' };
            const vnDate = new Intl.DateTimeFormat('vi-VN', dateOptions).format(now);
            document.getElementById('vnClock').innerText = `🇻🇳 ${vnDate} - ${vnTime}`;
        }
        setInterval(updateClock, 1000);

        // --- 2. CHỈNH SỬA MỤC TIÊU ---
        function editGoal() {
            const newGoal = prompt("Nhập mục tiêu mới của cậu:", document.getElementById('myGoal').innerText);
            if(newGoal) {
                document.getElementById('myGoal').innerText = newGoal;
                localStorage.setItem('qn_goal', newGoal);
            }
        }
        if(localStorage.getItem('qn_goal')) document.getElementById('myGoal').innerText = localStorage.getItem('qn_goal');

        // --- 3. ĐỔI MÀU GIAO DIỆN ---
        function setTheme(accent, bg) {
            document.documentElement.style.setProperty('--accent', accent);
            document.documentElement.style.setProperty('--bg-main', bg);
            localStorage.setItem('qn_theme_accent', accent);
            localStorage.setItem('qn_theme_bg', bg);
        }
        if(localStorage.getItem('qn_theme_accent')) setTheme(localStorage.getItem('qn_theme_accent'), localStorage.getItem('qn_theme_bg'));

        // --- 4. LOGIC LỊCH THÁNG (ADD/DELETE) ---
        let calData = JSON.parse(localStorage.getItem('qn_cal')) || {};
        function renderCal() {
            const grid = document.getElementById('calGrid');
            while(grid.children.length > 7) grid.removeChild(grid.lastChild);
            for(let i=1; i<=30; i++) {
                let day = document.createElement('div');
                day.className = 'cal-day';
                let events = (calData[i] || []).map((ev, idx) => `<div class="event-tag" onclick="deleteCal(${i}, ${idx})">${ev}</div>`).join('');
                day.innerHTML = `<div class="day-num">${i}</div>${events}<div class="add-btn-small" onclick="addCal(${i})">+</div>`;
                grid.appendChild(day);
            }
        }
        window.addCal = (d) => { 
            let v = prompt("Sự kiện ngày " + d + "?"); 
            if(v){ if(!calData[d]) calData[d]=[]; calData[d].push(v); localStorage.setItem('qn_cal', JSON.stringify(calData)); renderCal(); }
        };
        window.deleteCal = (d, idx) => { calData[d].splice(idx, 1); localStorage.setItem('qn_cal', JSON.stringify(calData)); renderCal(); };

        // --- 5. WEEKLY & DAILY (TƯƠNG TỰ) ---
        // (Tớ đã tối ưu để code chạy trực tiếp và lưu vào localStorage của cậu)
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // --- 6. ĐẾM NGƯỢC (Gợi ý thêm) ---
        function updateCountdown() {
            const gradDate = new Date('2026-06-30').getTime(); // Cậu chỉnh lại ngày tốt nghiệp ở đây nhé
            const now = new Date().getTime();
            const diff = gradDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerText = days > 0 ? `${days} ngày nữa 🎓` : "Đã đến lúc tỏa sáng!";
        }
        updateCountdown();

        // Khởi tạo Weekly Planner đơn giản
        const daysWk = ['T2','T3','T4','T5','T6','T7','CN'];
        function renderWk() {
            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '<div class="wk-header"></div>' + daysWk.map(d=>`<div class="wk-header">${d}</div>`).join('');
            ['Sáng','Chiều','Tối'].forEach(t => {
                grid.innerHTML += `<div class="wk-time">${t}</div>`;
                daysWk.forEach(d => grid.innerHTML += `<div class="wk-cell">--<div class="add-btn-small">+ Thêm</div></div>`);
            });
        }

        renderCal();
        renderWk();
    </script>
</body>
</html>
