<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #fce4ec; 
            --bg-card: #ffffff; 
            --text-main: #000000; 
            --accent: #ec407a; 
            --border: #f8bbd0;
            --red: #ff5f5f;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Syne', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--accent); font-size: 28px; }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .tab-btn { background: var(--bg-card); border: 2px solid var(--border); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .tab-content { display: none; background: var(--bg-card); padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LỊCH THÁNG --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-header { font-weight: bold; color: var(--accent); padding: 10px 0; border-bottom: 2px solid var(--border); }
        .cal-day { border: 1px solid #f0f0f0; border-radius: 8px; min-height: 100px; display: flex; flex-direction: column; padding: 5px; transition: 0.2s; position: relative;}
        .cal-day:hover { border-color: var(--accent); background: #fffafc; }
        .day-num { font-weight: bold; margin-bottom: 5px; }
        .event-tag { font-size: 11px; background: var(--bg-main); color: var(--accent); padding: 4px; border-radius: 4px; margin-bottom: 3px; text-align: left; cursor: pointer; border-left: 3px solid var(--accent); word-break: break-word;}
        .add-event-btn { font-size: 10px; color: #999; cursor: pointer; border: 1px dashed #ccc; border-radius: 4px; margin-top: auto; padding: 2px; }
        .add-event-btn:hover { background: var(--bg-main); color: var(--accent); border-color: var(--accent); }

        /* --- KẾ HOẠCH TUẦN --- */
        .weekly-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; }
        .wk-header, .wk-time, .wk-cell { background: #fff; padding: 10px; }
        .wk-header { text-align: center; font-weight: bold; color: var(--accent); background: var(--bg-main); }
        .wk-time { font-weight: bold; display: flex; align-items: center; justify-content: center; background: var(--bg-main); color: var(--accent); writing-mode: vertical-rl; transform: rotate(180deg);}
        .wk-cell { min-height: 120px; display: flex; flex-direction: column; gap: 5px; }
        .wk-task { font-size: 11px; padding: 6px; border-radius: 4px; display: flex; align-items: flex-start; gap: 5px; background: #fafafa; border: 1px solid #eee; border-left: 3px solid var(--accent); }
        .wk-task.done { opacity: 0.5; text-decoration: line-through; border-left-color: #ccc; }
        .wk-task input { margin-top: 2px; cursor: pointer; accent-color: var(--accent);}
        .delete-btn { margin-left: auto; background: none; border: none; color: #ff5f5f; cursor: pointer; font-weight: bold; }

        /* --- VIỆC HÔM NAY --- */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        .input-group button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold;}
        .daily-task { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .daily-task.done { opacity: 0.5; text-decoration: line-through; border-left-color: #ccc; }

        @media (max-width: 768px) {
            .weekly-grid { grid-template-columns: 1fr; }
            .wk-header, .wk-time { display: none; }
            .wk-cell { border: 1px solid var(--border); margin-bottom: 10px; border-radius: 8px; padding-top: 30px; position: relative;}
            .wk-cell::before { content: attr(data-label); position: absolute; top: 0; left: 0; right: 0; background: var(--bg-main); padding: 5px 10px; font-weight: bold; color: var(--accent); border-radius: 8px 8px 0 0; font-size: 12px;}
        }
    </style>
</head>
